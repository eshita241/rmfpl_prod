name: Build and Deploy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: production_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/production_db?schema=public
      JWT_SECRET: ci-secret
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:5000/auth/google/callback
      FRONTEND_URL: http://localhost:5173
      VITE_API_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend health check
        working-directory: backend
        run: |
          npm run start &
          sleep 5
          curl --fail http://localhost:5000/health

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t production-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t production-frontend ./frontend
